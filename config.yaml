# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: dolomite-liquidator
description: Dolomite margin protocol liquidation indexer (1:1 port of the Dolomite liquidator subgraph)
# Subgraph builds entity IDs from lowercase addresses (toHexString); match that exactly.
address_format: lowercase

# Transaction hash is needed for the Transaction entity id.
field_selection:
  transaction_fields:
    - hash

contracts:
  - name: DolomiteMargin
    abi_file_path: ./abis/dolomite-margin.events.json
    events:
      - event: LogSetEarningsRate
      - event: LogSetLiquidationSpread
      - event: LogSetMarginRatio
      - event: LogSetMinBorrowedValue
      - event: LogAddMarket
      - event: LogRemoveMarket
      - event: LogSetIsClosing
      - event: LogSetMarginPremium
      - event: LogSetSpreadPremium
      - event: LogSetLiquidationSpreadPremium
      - event: LogDeposit
      - event: LogWithdraw
      - event: LogTransfer
      - event: LogBuy
      - event: LogSell
      - event: LogTrade
      - event: LogLiquidate
      - event: LogVaporize

  - name: Expiry
    abi_file_path: ./abis/dolomite-margin.events.json
    events:
      - event: ExpirySet

  - name: EventEmitterRegistry
    abi_file_path: ./abis/event-emitter-registry.events.json
    events:
      - event: AsyncDepositCreated
      - event: AsyncDepositOutputAmountUpdated
      - event: AsyncDepositExecuted
      - event: AsyncDepositFailed
      - event: AsyncDepositCancelled
      - event: AsyncDepositCancelledFailed
      - event: AsyncWithdrawalCreated
      - event: AsyncWithdrawalOutputAmountUpdated
      - event: AsyncWithdrawalExecuted
      - event: AsyncWithdrawalFailed
      - event: AsyncWithdrawalCancelled

chains:
  - id: 1 # Ethereum
    start_block: 22753940
    rpc:
      - url: ${ENVIO_RPC_URL_1}
        for: fallback
    contracts:
      - name: DolomiteMargin
        address: "0x003Ca23Fd5F0ca87D01F6eC6CD14A8AE60c2b97D"
      - name: Expiry
        address: "0x2Ae007882b91206942c70ADc833A61Ee531D8D5D"
      - name: EventEmitterRegistry
        address: "0x6d40138c99F6D9116F738F44A0E6751A42232486"

